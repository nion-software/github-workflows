name: Reusable workflow to build Python package

on:
  workflow_call:
    inputs:
      python-versions:
        description: 'Python versions to test'
        type: string
        default: "['3.12', '3.13', '3.14']"
      publish-anaconda:
        description: 'Whether to publish to Anaconda'
        type: boolean
        default: true
    secrets:
      anaconda-token:
        description: 'Anaconda token'
        required: true

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ${{ fromJson(inputs.python-versions) }}

    steps:
    - uses: actions/checkout@v5
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Display Python version
      run: python -c "import sys; print(sys.version)"
    - name: Build Distribution
      run: |
        python -m pip install --upgrade pip
        python -m pip install build
        python -m build
    - name: Install Test Dependencies
      run: |
        python -m pip install mypy pytest
        pip install -r test-requirements.txt
    - name: Run Type Checking
      run: |
        mypy
    - name: Run Tests
      run: |
        python -m pytest
    - name: Upload Artifacts Debug
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      run: |
        echo "Uploading artifacts"
        echo "Current directory: $(pwd)"
        echo "Files in current directory:"
        ls -lR
        echo "Matrix OS is ${{ matrix.os }}"
        echo "Matrix Python version is ${{ matrix.python-version }}"
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      with:
        name: distribution
        path: dist
    - name: Set up Miniconda for conda-build
      if: inputs.publish-anaconda == true && github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags') && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: '3.12'
    - name: Build/publish anaconda package
      if: inputs.publish-anaconda == true && github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags') && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      shell: bash -l {0}
      run: |
        # make a directory to avoid name conflicts with the channel. argh.
        mkdir conda_build
        pushd conda_build
        echo "Current directory: $(pwd)"
        echo "Update base conda and all packages"
        conda update -n base --all -y -q
        echo "Update this environment and all packages"
        conda update --all -y -q
        echo "Install conda-build and anaconda-client"
        conda install conda-build anaconda-client -y -q
        echo "Build and upload package"
        conda-build -q -c nion --skip-existing --user nion --token ${{ secrets.anaconda-token }} ..
        popd
